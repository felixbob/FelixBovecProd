[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/webhook/resend"
  to = "/.netlify/functions/resend-webhook"
  status = 200

[[redirects]]
  from = "/api/webhooks/resend"
  to = "/.netlify/functions/resend-webhook"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
